[build]
  command = "npm run build"
  publish = "apps/web/dist"
  edge_functions = "apps/web/netlify/edge-functions"

[dev]
  command = "npx astro dev --root apps/web"
  framework = "#custom"
  targetPort = 4321
  port = 8888

[functions]
  directory = "apps/web/netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/api/patches"
  function = "rate-limit"

[functions."cleanup-expired"]
  schedule = "@daily"
