[build]
  base = "apps/web"
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npx astro dev"
  framework = "#custom"
  targetPort = 4321
  port = 8888

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/api/patches"
  function = "rate-limit"

[functions."cleanup-expired"]
  schedule = "@daily"
